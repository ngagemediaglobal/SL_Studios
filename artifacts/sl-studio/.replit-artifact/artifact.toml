kind = "web"
previewPath = "/"
title = "SL Studio Portfolio"
version = "1.0.0"
id = "artifacts/sl-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23554

[services.development]
run = "pnpm --filter @workspace/sl-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sl-studio", "run", "build" ]
publicDir = "artifacts/sl-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23554"
BASE_PATH = "/"
